name: Trading Bot - Analyse CAC 40

on:
  schedule:
    # Le cron GitHub Actions est "best-effort" : sur les repos publics gratuits il est
    # régulièrement retardé de plusieurs heures, voire totalement sauté (constaté les
    # 01/07 et 02/07/2026). Un cron manqué n'est JAMAIS rattrapé par GitHub.
    # Stratégie : un filet de 6 créneaux étalés entre 15h07 et 17h37 UTC ; le premier
    # qui se déclenche exécute le bot, les suivants se terminent sans rien faire grâce
    # au garde-fou "déjà tourné aujourd'hui" ci-dessous. Il faudrait que GitHub saute
    # les 6 créneaux d'affilée pour rater une journée.
    # Cible : ~17h00 Paris (15h00 UTC en été). Minutes décalées de :00/:30 pile,
    # les plus chargées sur l'infra GitHub. Du lundi au vendredi (1-5).
    - cron: '12 15 * * 1-5'
    - cron: '43 15 * * 1-5'
    - cron: '12 16 * * 1-5'
    - cron: '43 16 * * 1-5'
    - cron: '12 17 * * 1-5'
    - cron: '43 17 * * 1-5'
  workflow_dispatch: # Permet de lancer manuellement depuis l'interface GitHub

# Jamais deux runs en parallèle : si deux créneaux se déclenchent presque en même
# temps, le second attend la fin du premier (et sera alors skippé par le garde-fou).
concurrency:
  group: trading-bot-daily
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nécessaire pour pouvoir faire un push (commit)

    steps:
      - name: Check out du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Vérifier si le bot a déjà tourné avec succès aujourd'hui
        id: check
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          ALREADY_RUN=$(gh run list --workflow=trading_bot.yml --status success \
            --json databaseId,createdAt \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }}) | select(.createdAt | startswith(\"$TODAY\"))] | length")
          echo "Exécutions réussies aujourd'hui (hors run courant) : $ALREADY_RUN"
          if [ "$ALREADY_RUN" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configuration de Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Exécution du bot de trading
        if: steps.check.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit et Push des résultats (portfolio et history)
        if: steps.check.outputs.skip != 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "📈 Mise à jour quotidienne du bot [skip ci]" || echo "Aucun changement à commiter"
          # Le remote peut avoir avancé pendant l'exécution du bot (autre push,
          # autre run) : on se rebase avant de pousser, avec quelques tentatives.
          pushed=false
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push; then
              pushed=true
              break
            fi
            echo "Push refusé (tentative $attempt), nouvel essai dans 5s..."
            sleep 5
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Échec du push après 3 tentatives"
            exit 1
          fi
