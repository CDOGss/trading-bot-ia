name: Deploy Dashboard to GitHub Pages

on:
  # Redéploie quand la page ou les données du bot changent sur main.
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'history.json'
      - 'portfolio.json'
      - 'daily_report.md'
      - '.github/workflows/deploy-pages.yml'
  # Le bot commit ses résultats avec "[skip ci]", ce qui empêche le trigger "push"
  # ci-dessus de se déclencher. On se raccroche donc à la fin du workflow du bot
  # pour redéployer le site après chaque mise à jour quotidienne.
  workflow_run:
    workflows: ["Trading Bot - Analyse CAC 40"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Toujours construire la pointe de main : lors d'un workflow_run, head_sha
          # peut pointer sur un commit antérieur à celui que le bot vient de pousser.
          ref: main

      - name: Assembler le site (page + données)
        run: |
          mkdir -p dist
          cp web/index.html dist/index.html
          # Les données du bot sont copiées à la racine du site pour être fetchées.
          for f in history.json portfolio.json daily_report.md performance_chart.png; do
            [ -f "$f" ] && cp "$f" dist/ || echo "Fichier optionnel absent : $f"
          done
          # Empêche Jekyll de traiter le dossier (sert les fichiers tels quels).
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
