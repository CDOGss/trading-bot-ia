<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot IA — CAC 40</title>
  <meta name="description" content="Performances du bot de trading IA (CAC 40 / SBF 120) vs ETF CAC 40." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-dark: #0f111a;
      --bg-card: rgba(25, 28, 41, 0.6);
      --text-primary: #f8f9fa;
      --text-secondary: #a0a5b1;
      --accent-primary: #00f2fe;
      --accent-secondary: #4facfe;
      --success: #00e676;
      --danger: #ff1744;
      --warning: #ffb300;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.15), transparent 25%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

    h1, h2 { color: var(--text-primary); font-weight: 600; }

    .text-gradient {
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .centered-msg { text-align: center; margin-top: 6rem; color: var(--text-secondary); font-size: 1.1rem; }

    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    /* ===== Header ===== */
    .app-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 20px; flex-wrap: wrap;
      margin: 32px 0 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 2.6rem; letter-spacing: -1.2px; line-height: 1.05; }
    .app-header .subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-top: 6px; }
    .header-meta { text-align: right; color: var(--text-secondary); font-size: 0.85rem; }
    .header-meta a { color: var(--accent-secondary); text-decoration: none; }
    .header-meta a:hover { text-decoration: underline; }
    .pulse-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--success); margin-right: 6px; box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    @media (max-width: 640px) { .app-header h1 { font-size: 2rem; } }

    /* ===== Time selector ===== */
    .time-selector {
      display: inline-flex; gap: 4px; padding: 4px;
      background: rgba(0,0,0,0.25); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .time-btn {
      border: none; background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      padding: 8px 16px; border-radius: 9px; cursor: pointer; transition: all 0.2s;
    }
    .time-btn:hover { color: var(--text-primary); }
    .time-btn.active {
      background: linear-gradient(135deg, rgba(0,242,254,0.18), rgba(79,172,254,0.12));
      color: var(--accent-primary);
      box-shadow: 0 0 12px rgba(0,242,254,0.12);
    }
    .time-selector .sel-label { color: var(--text-secondary); font-size: 0.85rem; padding: 8px 6px 8px 12px; align-self: center; }

    /* ===== Dashboard ===== */
    .dashboard-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px; margin-bottom: 24px;
    }
    .stat-label { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 10px; }
    .stat-label svg { width: 16px; height: 16px; }
    .stat-value { font-size: 2.2rem; font-weight: 700; line-height: 1.1; margin-bottom: 6px; }
    .stat-sub { font-size: 0.9rem; font-weight: 600; }
    .positive { color: var(--success); }
    .negative { color: var(--danger); }
    .muted { color: var(--text-secondary); }

    .chart-container { margin-bottom: 12px; }
    .section-title { margin: 2.5rem 0 1.2rem; font-size: 1.5rem; }
    .section-title.with-icon { display: flex; align-items: center; gap: 10px; }
    .section-title.with-icon svg { width: 22px; height: 22px; color: var(--accent-primary); }

    /* ===== Cards lists ===== */
    .cards-container { display: flex; flex-direction: column; gap: 18px; }
    .empty-msg { color: var(--text-secondary); }

    .pos-card { display: flex; flex-direction: column; gap: 14px; }
    .pos-card.highlight {
      border-color: rgba(0,242,254,0.45);
      box-shadow: 0 0 0 1px rgba(0,242,254,0.25), 0 8px 32px rgba(0,242,254,0.12);
    }
    .pos-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .pos-title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .pos-name { font-size: 1.15rem; font-weight: 700; }
    .ticker-badge {
      font-family: 'Outfit', monospace; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.5px; padding: 3px 9px; border-radius: 8px;
      background: rgba(0,242,254,0.12); color: var(--accent-primary);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; white-space: nowrap;
    }
    .badge.pending { background: rgba(255,179,0,0.15); color: var(--warning); }
    .badge.won { background: rgba(0,230,118,0.15); color: var(--success); }
    .badge.lost { background: rgba(255,23,68,0.15); color: var(--danger); }

    .pos-meta { display: flex; gap: 24px; flex-wrap: wrap; }
    .pos-meta .item { display: flex; flex-direction: column; gap: 2px; }
    .pos-meta .item .k { color: var(--text-secondary); font-size: 0.78rem; }
    .pos-meta .item .v { font-size: 1.05rem; font-weight: 600; }

    .analysis-box {
      background: rgba(0,0,0,0.25); border-left: 3px solid var(--accent-secondary);
      border-radius: 12px; padding: 14px 18px;
    }
    .analysis-title { display: block; margin-bottom: 6px; font-weight: 600; }
    .analysis-box p { color: var(--text-secondary); line-height: 1.6; font-size: 0.9rem; }

    /* history compact */
    .hist-times { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .time-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px; padding: 5px 10px; font-size: 0.8rem;
    }
    .time-chip .t { color: var(--text-secondary); }
    .time-chip .p { font-weight: 700; }

    .footer-note { text-align: center; color: var(--text-secondary); font-size: 0.82rem; margin-top: 3rem; opacity: 0.8; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
  </style>
</head>
<body>
  <div id="root">
    <div id="app" class="centered-msg">Chargement des performances du bot…</div>
  </div>

  <script>
    const TIMES = ["09:00", "09:30", "12:00", "17:00"];
    const STAKE = 500; // mise par position (€), fixée par le bot
    let currentTime = "09:30"; // horaire de revente par défaut (celui du rapport quotidien)
    let HISTORY = [];
    let PORTFOLIO = [];

    const euro = (n) => (n >= 0 ? "+" : "") + n.toFixed(2) + " €";
    const pct = (n) => (n >= 0 ? "+" : "") + n.toFixed(2) + " %";
    const fmtDate = (d) => { try { return new Date(d).toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'}); } catch { return d; } };

    const ICONS = {
      wallet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0 0 4h14a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5"/><path d="M18 12a1 1 0 0 0 0 2h2v-2z"/></svg>',
      percent: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>',
      trending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
      trophy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>',
      target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
      history: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>',
    };

    let chart = null;

    async function loadData() {
      try {
        const [h, p] = await Promise.all([
          fetch('history.json?_=' + Date.now()).then(r => r.ok ? r.json() : []).catch(() => []),
          fetch('portfolio.json?_=' + Date.now()).then(r => r.ok ? r.json() : []).catch(() => []),
        ]);
        HISTORY = Array.isArray(h) ? h : [];
        PORTFOLIO = Array.isArray(p) ? p : [];
        render();
      } catch (e) {
        document.getElementById('app').innerHTML = '<div class="centered-msg">Impossible de charger les données du bot.</div>';
      }
    }

    // Trades évalués pour l'horaire sélectionné (perf non nulle)
    function tradesForTime(t) {
      return HISTORY
        .filter(e => e.performance && e.performance[t] && typeof e.performance[t] === 'object')
        .sort((a, b) => (a.eval_date || '').localeCompare(b.eval_date || ''));
    }

    function computeStats(t) {
      const trades = tradesForTime(t);
      let botPnL = 0, benchPnL = 0, wins = 0;
      trades.forEach(e => {
        const g = e.performance[t].gain_loss_eur || 0;
        botPnL += g;
        if (g >= 0) wins++;
        const b = e.benchmark_performance && e.benchmark_performance[t];
        if (b && typeof b === 'object') benchPnL += (b.gain_loss_eur || 0);
      });
      const invested = trades.length * STAKE;
      const roi = invested > 0 ? (botPnL / invested) * 100 : 0;
      const winRate = trades.length > 0 ? (wins / trades.length) * 100 : 0;
      return { trades, botPnL, benchPnL, invested, roi, winRate, surperf: botPnL - benchPnL };
    }

    function buildChart(t) {
      const trades = tradesForTime(t);
      const labels = ['Départ'];
      const bot = [0], bench = [0];
      let cb = 0, cn = 0;
      trades.forEach(e => {
        cb += e.performance[t].gain_loss_eur || 0;
        const b = e.benchmark_performance && e.benchmark_performance[t];
        cn += (b && typeof b === 'object') ? (b.gain_loss_eur || 0) : 0;
        labels.push((e.eval_date || '').slice(5));
        bot.push(Number(cb.toFixed(2)));
        bench.push(Number(cn.toFixed(2)));
      });

      const ctx = document.getElementById('perfChart').getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 300);
      grad.addColorStop(0, 'rgba(0, 242, 254, 0.28)');
      grad.addColorStop(1, 'rgba(0, 242, 254, 0.0)');

      const data = {
        labels,
        datasets: [
          { label: 'Bot IA', data: bot, borderColor: '#00f2fe', backgroundColor: grad, fill: true, tension: 0.35, pointRadius: 3, pointBackgroundColor: '#00f2fe', borderWidth: 2.5 },
          { label: 'ETF CAC 40', data: bench, borderColor: '#ffb300', backgroundColor: 'transparent', fill: false, tension: 0.35, borderDash: [6, 5], pointRadius: 2, pointBackgroundColor: '#ffb300', borderWidth: 2 },
        ],
      };
      const options = {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#a0a5b1', usePointStyle: true, pointStyleWidth: 10, font: { family: 'Outfit', size: 13 } } },
          tooltip: {
            backgroundColor: 'rgba(25, 28, 41, 0.95)', titleColor: '#fff', bodyColor: '#a0a5b1',
            borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1, padding: 12, usePointStyle: true,
            callbacks: { label: (c) => ' ' + c.dataset.label + ' : ' + euro(c.parsed.y) }
          },
        },
        scales: {
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#a0a5b1', callback: (v) => v + ' €' } },
          x: { grid: { display: false }, ticks: { color: '#a0a5b1', maxRotation: 45, minRotation: 0 } },
        },
      };

      // render() reconstruit tout le DOM (donc un nouveau <canvas>) à chaque changement
      // d'horaire : on détruit l'ancienne instance et on en recrée une sur le canvas courant.
      if (chart) chart.destroy();
      chart = new Chart(ctx, { type: 'line', data, options });
    }

    function statCard(icon, label, valueHtml, subHtml) {
      return `<div class="glass-card">
        <div class="stat-label">${icon}${label}</div>
        <div class="stat-value">${valueHtml}</div>
        <div class="stat-sub">${subHtml || ''}</div>
      </div>`;
    }

    function positionCard(p) {
      return `<div class="glass-card pos-card highlight">
        <div class="pos-header">
          <div class="pos-title">
            <span class="pos-name">${p.company || 'Position'}</span>
            <span class="ticker-badge">${p.ticker || ''}</span>
          </div>
          <span class="badge pending">⏳ En cours</span>
        </div>
        <div class="pos-meta">
          <div class="item"><span class="k">Prix d'achat</span><span class="v">${Number(p.buy_price).toFixed(2)} €</span></div>
          <div class="item"><span class="k">Montant</span><span class="v">${(p.amount_eur || STAKE).toFixed ? (p.amount_eur||STAKE).toFixed(0) : p.amount_eur} €</span></div>
          <div class="item"><span class="k">Date d'achat</span><span class="v">${fmtDate(p.buy_date)}</span></div>
        </div>
        ${p.reason ? `<div class="analysis-box"><strong class="analysis-title">🧠 Analyse de l'IA</strong><p>${p.reason}</p></div>` : ''}
      </div>`;
    }

    function historyCard(e, t) {
      const perf = e.performance[t];
      const g = perf ? (perf.gain_loss_eur || 0) : null;
      const cls = g === null ? 'pending' : (g >= 0 ? 'won' : 'lost');
      const badgeTxt = g === null ? '— En attente' : `${g >= 0 ? '✓' : '✗'} ${euro(g)}`;
      const chips = TIMES.map(tk => {
        const pv = e.performance[tk];
        if (!pv || typeof pv !== 'object') return `<span class="time-chip"><span class="t">${tk}</span><span class="p muted">—</span></span>`;
        const gv = pv.gain_loss_eur || 0;
        return `<span class="time-chip"><span class="t">${tk}</span><span class="p ${gv >= 0 ? 'positive' : 'negative'}">${euro(gv)}</span></span>`;
      }).join('');
      const bench = e.benchmark_performance && e.benchmark_performance[t];
      const benchTxt = (bench && typeof bench === 'object') ? `CAC 40 : ${euro(bench.gain_loss_eur || 0)}` : '';
      return `<div class="glass-card pos-card">
        <div class="pos-header">
          <div class="pos-title">
            <span class="pos-name">${e.company || e.ticker}</span>
            <span class="ticker-badge">${e.ticker || ''}</span>
          </div>
          <span class="badge ${cls}">${badgeTxt}</span>
        </div>
        <div class="pos-meta">
          <div class="item"><span class="k">Évalué le</span><span class="v">${fmtDate(e.eval_date)}</span></div>
          <div class="item"><span class="k">Prix d'achat</span><span class="v">${Number(e.buy_price).toFixed(2)} €</span></div>
          ${benchTxt ? `<div class="item"><span class="k">Benchmark (${t})</span><span class="v muted">${benchTxt}</span></div>` : ''}
        </div>
        <div class="hist-times">${chips}</div>
      </div>`;
    }

    function render() {
      const s = computeStats(currentTime);
      const lastDate = (() => {
        const ds = [...HISTORY.map(e => e.eval_date), ...PORTFOLIO.map(p => p.buy_date)].filter(Boolean).sort();
        return ds.length ? fmtDate(ds[ds.length - 1]) : '—';
      })();

      const timeButtons = TIMES.map(t => `<button class="time-btn ${t === currentTime ? 'active' : ''}" data-t="${t}">${t}</button>`).join('');

      const html = `
      <div class="animate-fade-in">
        <header class="app-header">
          <div>
            <h1>Trading Bot <span class="text-gradient">CAC 40 IA</span></h1>
            <div class="subtitle">Simulation quotidienne — achat en fin de séance, revente à l'ouverture. 500 € par position.</div>
          </div>
          <div class="header-meta">
            <div><span class="pulse-dot"></span>Mis à jour le ${lastDate}</div>
            <div style="margin-top:4px"><a href="https://github.com/CDOGss/trading-bot-ia" target="_blank" rel="noopener">Voir le code sur GitHub ↗</a></div>
          </div>
        </header>

        <div class="time-selector">
          <span class="sel-label">Horaire de revente :</span>
          ${timeButtons}
        </div>

        <div class="dashboard-grid">
          ${statCard(ICONS.wallet, 'P&amp;L cumulé', `<span class="${s.botPnL >= 0 ? 'positive' : 'negative'}">${euro(s.botPnL)}</span>`, `<span class="muted">${s.trades.length} trade${s.trades.length > 1 ? 's' : ''} · ${s.invested.toFixed(0)} € engagés</span>`)}
          ${statCard(ICONS.percent, 'ROI', `<span class="${s.roi >= 0 ? 'positive' : 'negative'}">${pct(s.roi)}</span>`, `<span class="muted">sur capital engagé</span>`)}
          ${statCard(ICONS.trophy, 'Taux de réussite', `${s.winRate.toFixed(0)} %`, `<span class="muted">trades gagnants</span>`)}
          ${statCard(ICONS.trending, 'vs ETF CAC 40', `<span class="${s.surperf >= 0 ? 'positive' : 'negative'}">${euro(s.surperf)}</span>`, `<span class="muted">sur-performance</span>`)}
        </div>

        <div class="glass-card chart-container">
          <h2 class="section-title" style="margin:0 0 1rem">Performance cumulée (revente à ${currentTime})</h2>
          <div style="height:320px"><canvas id="perfChart"></canvas></div>
        </div>

        <h2 class="section-title with-icon">${ICONS.target} Positions ouvertes</h2>
        <div class="cards-container">
          ${PORTFOLIO.length === 0
            ? '<p class="empty-msg glass-card" style="padding:20px">Aucune position ouverte. Le bot est en cash (marché jugé trop incertain).</p>'
            : PORTFOLIO.map(positionCard).join('')}
        </div>

        <h2 class="section-title with-icon">${ICONS.history} Historique des trades</h2>
        <div class="cards-container">
          ${HISTORY.length === 0
            ? '<p class="empty-msg glass-card" style="padding:20px">Pas encore de trade évalué.</p>'
            : [...HISTORY].reverse().map(e => historyCard(e, currentTime)).join('')}
        </div>

        <p class="footer-note">Simulation à but pédagogique — aucune position réelle. Analyse générée automatiquement par l'IA (Gemini).</p>
      </div>`;

      document.getElementById('app').outerHTML = '<div id="app">' + html + '</div>';
      buildChart(currentTime);

      document.querySelectorAll('.time-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTime = btn.dataset.t;
          render();
        });
      });
    }

    loadData();
  </script>
</body>
</html>
